<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes App by Syed Shakir</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>K8s Notes</h1>
      <p class="subtitle">3‑tier CRUD app by Syed Shakir v3 (Frontend → Backend → MongoDB)</p>
    </header>

    <main class="app-main">
      <section class="card form-card">
        <h2>Add / Edit Note</h2>
        <form id="note-form">
          <input type="hidden" id="note-id" />

          <div class="form-group">
            <label for="title">Title<span class="required">*</span></label>
            <input
              id="title"
              type="text"
              class="form-control"
              placeholder="Enter title here"
              required
            />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea
              id="description"
              rows="3"
              class="form-control"
              placeholder="Short details about this note..."
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn primary">Save</button>
            <button type="button" id="cancel-edit" class="btn ghost hidden">
              Cancel Edit
            </button>
          </div>

          <p id="form-status" class="status-text"></p>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Notes</h2>
          <button id="refresh-btn" class="btn ghost small">Refresh</button>
        </div>
        <div id="notes-container" class="notes-list"></div>
        <p id="list-status" class="status-text"></p>
      </section>
    </main>

    <footer class="app-footer">
      <span>Frontend → Backend (Node) → MongoDB</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
